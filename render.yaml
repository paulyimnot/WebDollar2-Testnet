databases:
  - name: webdollar2-db
    databaseName: webdollar2db
    user: webdollar2user
    plan: free

services:
  # ─── WebDollar2 Main App ────────────────────────────────────────────────────
  - type: web
    name: webdollar2-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webdollar2-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        value: "sk-optional"
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"

  # ─── Vanish-VAM Trading Bot ─────────────────────────────────────────────────
  - type: web
    name: vanish-vam-bot
    env: node
    plan: starter          # Starter = always-on, no cold starts
    rootDir: VAM_BUILD     # Points to the VAM_BUILD subfolder in this same repo
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DRY_RUN
        value: "true"      # ← flip to "false" once paper trading looks good
      - key: SYMBOL
        value: PEPEUSD
      - key: ACCOUNT_BALANCE
        value: "5000"
      - key: RISK_PER_TRADE
        value: "0.01"
      - key: MAKER_FEE
        value: "0.0016"
      - key: ATR_PERIOD
        value: "14"
      - key: STOP_ATR_MULT
        value: "0.5"
      - key: TARGET_ATR_MULT
        value: "2.0"
      - key: VOLUME_SPIKE_MULTIPLIER
        value: "3.0"
      - key: VWAP_BREAK_MIN
        value: "0.005"
      - key: OBI_LONG_THRESHOLD
        value: "0.60"
      - key: OBI_SHORT_THRESHOLD
        value: "0.40"
      - key: ATR_DORMANT_THRESHOLD
        value: "0.003"
      - key: ATR_VOLATILE_THRESHOLD
        value: "0.02"
      - key: MAX_DAILY_LOSS
        value: "0.03"
      - key: MAX_DRAWDOWN_USD
        value: "500"
      - key: SLIPPAGE_PCT
        value: "0.0005"
      # ── Secret keys: set these in Render Dashboard → Environment ──────────────
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
