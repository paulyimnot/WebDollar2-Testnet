databases:
  - name: webdollar2-db
    databaseName: webdollar2db
    user: webdollar2user
    plan: free

services:
  - type: web
    name: webdollar2-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webdollar2-db
          property: connectionString
      - key: OPENAI_API_KEY
        value: "sk-dummy_key_to_bypass_openai_startup_crash"
      - key: PORT
        value: "5000"
