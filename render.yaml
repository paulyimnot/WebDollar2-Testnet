databases:
  - name: webdollar2-db
    databaseName: webdollar2db
    user: webdollar2user
    plan: free

services:
  - type: web
    name: webdollar2-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    envVars:
      # --- Deployment Nudge (Forces Render to refresh connection) ---
      - key: DATABASE_URL
        fromDatabase:
          name: webdollar2-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        value: "sk-optional"
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
