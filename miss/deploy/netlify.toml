headersOrigin = "config"

[functions]

  [functions."*"]

[[plugins]]
origin = "ui"
package = "netlify-plugin-inline-critical-css"
pinned_version = "2"

  [plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-gridsome-cache"
pinned_version = "1"

  [plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-hugo-cache-resources"
pinned_version = "0.2"

  [plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-image-optim"
pinned_version = "0.4"

  [plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-pagewatch"

  [plugins.inputs]

[build]
publish = "/opt/build/repo/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "mkdir -p dist && cp -r index.html 200.html 404.html assets manifest.json vite.svg sw.js _redirects dist/"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/*.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/manifest.json"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/assets/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]