<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDollar 2 - Casino Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#040b16',
                        foreground: '#ffffff',
                        card: '#0a1020',
                        primary: '#1d4ed8', 
                        accent: '#ffd700', 
                    },
                    fontFamily: {
                        heading: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        body: ['Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #040b16;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0a1020 0%, #040b16 100%);
        }
        .btn-neon {
            background-color: #ffd700;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            border: none;
            transition: all 0.2s;
        }
        .btn-neon:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            background-color: #ffed4a;
            transform: scale(1.02);
        }
        .btn-neon:disabled {
            background-color: #333;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Slot Stuff */
        .reel-window { background: #000; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); overflow: hidden; border: 2px solid #333; }
        .reel-strip { display: flex; flex-direction: column; transition: transform cubic-bezier(0.1, 0.7, 0.1, 1); }
        .symbol { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* Roulette Stuff */
        .wheel-container {
            width: 260px; height: 260px; border-radius: 50%; position: relative;
            background: conic-gradient(
                #22c55e 0 9.7deg, #e63946 9.7deg 19.4deg, #111827 19.4deg 29.1deg, 
                #e63946 29.1deg 38.8deg, #111827 38.8deg 48.5deg, #e63946 48.5deg 58.2deg, #111827 58.2deg 67.9deg,
                #e63946 67.9deg 77.6deg, #111827 77.6deg 87.3deg, #e63946 87.3deg 97deg, #111827 97deg 106.7deg,
                #e63946 106.7deg 116.4deg, #111827 116.4deg 126.1deg, #e63946 126.1deg 135.8deg, #111827 135.8deg 145.5deg,
                #e63946 145.5deg 155.2deg, #111827 155.2deg 164.9deg, #e63946 164.9deg 174.6deg, #111827 174.6deg 184.3deg,
                #e63946 184.3deg 194deg, #111827 194deg 203.7deg, #e63946 203.7deg 213.4deg, #111827 213.4deg 223.1deg,
                #e63946 223.1deg 232.8deg, #111827 232.8deg 242.5deg, #e63946 242.5deg 252.2deg, #111827 252.2deg 261.9deg,
                #e63946 261.9deg 271.6deg, #111827 271.6deg 281.3deg, #e63946 281.3deg 291deg, #111827 291deg 300.7deg,
                #e63946 300.7deg 310.4deg, #111827 310.4deg 320.1deg, #e63946 320.1deg 329.8deg, #111827 329.8deg 339.5deg,
                #e63946 339.5deg 349.2deg, #111827 349.2deg 360deg
            );
            border: 6px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.3); transition: transform 3s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .bet-btn.selected { border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); transform: scale(1.05); }
    </style>
</head>
<body class="flex min-h-screen">
    <!-- Navbar / Sidebar -->
    <nav class="w-64 bg-card border-r border-blue-900/50 p-6 flex flex-col z-20 shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-heading font-black text-white drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">
                WEBD<span class="text-blue-500">2</span>
            </h1>
            <p class="text-accent text-[10px] font-mono tracking-widest mt-1">CASINO HUB</p>
        </div>

        <div class="flex flex-col gap-3 flex-grow">
            <button onclick="switchTab('faucet')" id="nav-faucet" class="nav-btn flex items-center gap-3 p-3 rounded-xl transition-all bg-blue-900/40 border border-blue-500 text-white font-bold">
                <i data-lucide="droplets" class="w-5 h-5 text-blue-400"></i> Faucet
            </button>
            <button onclick="switchTab('slots')" id="nav-slots" class="nav-btn flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/5 text-gray-400 font-bold hover:text-white">
                <i data-lucide="cherry" class="w-5 h-5"></i> Slots
            </button>
            <button onclick="switchTab('roulette')" id="nav-roulette" class="nav-btn flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/5 text-gray-400 font-bold hover:text-white">
                <i data-lucide="circle-dashed" class="w-5 h-5"></i> Roulette
            </button>
        </div>

        <div class="mt-auto border-t border-blue-900/50 pt-6">
            <div class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mb-2">Simulated Balance</div>
            <div class="text-2xl font-mono text-accent font-bold" id="global-balance">10,000</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col relative z-10 w-full">
        <!-- Persistent Wallet Input Header -->
        <header class="bg-black/40 border-b border-blue-900/50 p-4 sticky top-0 backdrop-blur-md z-30">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-4 justify-between">
                <p class="text-sm font-mono text-gray-400">Link your WebDollar 2 Wallet to participate in weekly sweeps.</p>
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <i data-lucide="wallet" class="w-5 h-5 text-accent"></i>
                    <input type="text" id="global-wallet" placeholder="Enter WEBD2 Address..." class="w-full md:w-80 font-mono bg-[#040b16] border border-blue-900/50 text-white text-sm rounded-md px-4 py-2 focus:outline-none focus:border-accent">
                </div>
            </div>
        </header>

        <div class="flex-grow p-4 md:p-8 flex items-center justify-center overflow-y-auto">
            
            <!-- FAUCET TAB -->
            <div id="tab-faucet" class="tab-content active w-full max-w-xl text-center">
                <i data-lucide="droplets" class="w-16 h-16 text-blue-500 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(59,130,246,0.6)]"></i>
                <h2 class="text-4xl font-black font-heading tracking-widest mb-2">DAILY <span class="text-accent">FAUCET</span></h2>
                <p class="text-gray-400 font-mono mb-8">Claim free simulated WEBD to play in the Casino Ecosystem.</p>
                
                <div class="bg-card border border-blue-900/50 p-8 rounded-2xl shadow-[0_0_30px_rgba(29,78,216,0.2)]">
                    <button id="claim-btn" class="w-full btn-neon py-4 rounded-xl font-heading text-2xl font-black tracking-widest flex items-center justify-center gap-2" onclick="claimFaucet()">
                        CLAIM 10,000 WEBD <i data-lucide="zap" class="w-6 h-6"></i>
                    </button>
                    <p id="faucet-status" class="mt-4 font-mono text-sm text-gray-400 h-6"></p>
                </div>
            </div>

            <!-- SLOTS TAB -->
            <div id="tab-slots" class="tab-content w-full max-w-2xl text-center">
                <h2 class="text-4xl font-black font-heading tracking-widest mb-2">WEBD <span class="text-accent">SLOTS</span></h2>
                <p class="text-gray-400 font-mono mb-8 text-sm">3 WEBD Coins = MEGA JACKPOT.</p>
                
                <div class="bg-card border border-blue-900/50 p-6 md:p-8 rounded-2xl shadow-[0_0_30px_rgba(29,78,216,0.2)] relative">
                    <!-- Reels -->
                    <div class="reel-window rounded-xl flex gap-2 md:gap-4 p-4 h-[130px] items-center relative bg-gradient-to-b from-gray-900 to-gray-800">
                        <div class="absolute w-full h-1 bg-red-500/20 left-0 top-1/2 -translate-y-1/2 z-0"></div>
                        <div class="flex-1 h-[100px] overflow-hidden relative z-10 border border-black rounded"><div id="reel-1" class="reel-strip"></div></div>
                        <div class="flex-1 h-[100px] overflow-hidden relative z-10 border border-black rounded"><div id="reel-2" class="reel-strip"></div></div>
                        <div class="flex-1 h-[100px] overflow-hidden relative z-10 border border-black rounded"><div id="reel-3" class="reel-strip"></div></div>
                    </div>
                    
                    <div class="mt-8 grid grid-cols-2 gap-4">
                        <div class="bg-black/50 p-4 rounded-xl border border-blue-900/50 flex flex-col justify-center">
                            <label class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mb-2">Bet Amount</label>
                            <div class="flex items-center gap-2">
                                <button class="text-blue-400 px-3 hover:text-white" onclick="adjustBet(-50)">-</button>
                                <input type="number" id="slots-bet" value="100" class="w-full bg-transparent text-white font-mono text-center text-xl font-bold focus:outline-none" readonly>
                                <button class="text-blue-400 px-3 hover:text-white" onclick="adjustBet(50)">+</button>
                            </div>
                        </div>
                        <button id="spin-btn" class="w-full h-full btn-neon rounded-xl font-heading text-2xl font-black italic tracking-wider p-4" onclick="spinSlots()">SPIN</button>
                    </div>
                    <div id="slots-msg" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-black font-heading text-accent opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center w-full shadow-black drop-shadow-xl">JACKPOT!</div>
                </div>
            </div>

            <!-- ROULETTE TAB -->
            <div id="tab-roulette" class="tab-content w-full max-w-3xl text-center">
                <h2 class="text-4xl font-black font-heading tracking-widest mb-2">WEBD <span class="text-accent">ROULETTE</span></h2>
                <div class="bg-card border border-blue-900/50 p-6 md:p-8 rounded-2xl shadow-[0_0_30px_rgba(29,78,216,0.2)] mt-6 flex flex-col md:flex-row gap-8 items-center justify-between">
                    <div class="flex-shrink-0 relative">
                        <div class="absolute top-[-15px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-white z-20 drop-shadow-md"></div>
                        <div class="wheel-container" id="wheel"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-36 h-36 bg-[#040b16] rounded-full border-4 border-blue-700 flex flex-col items-center justify-center z-10 shadow-[0_0_20px_black]">
                            <span class="text-[10px] text-gray-500 font-mono tracking-widest">RESULT</span>
                            <span class="text-4xl font-black font-mono text-white" id="r-result">--</span>
                        </div>
                    </div>
                    <div class="flex-grow w-full flex flex-col gap-4 text-left">
                        <div>
                            <label class="text-[10px] font-mono text-gray-400 uppercase mb-2 block">1. Select Bet</label>
                            <div class="flex items-center bg-black/50 p-2 rounded-lg border border-blue-900/30">
                                <button class="text-blue-400 px-3 hover:text-white" onclick="adjustBet(-50)">-</button>
                                <input type="number" id="roulette-bet" value="100" class="w-full bg-transparent text-white font-mono text-center text-lg font-bold outline-none" readonly>
                                <button class="text-blue-400 px-3 hover:text-white" onclick="adjustBet(50)">+</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-mono text-gray-400 uppercase mb-2 block">2. Select Color</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button id="bet-red" class="bet-btn bg-[#e63946] text-white font-bold py-2 rounded-lg shadow-md text-sm" onclick="selectColor('red')">RED</button>
                                <button id="bet-green" class="bet-btn bg-[#22c55e] text-white font-bold py-2 rounded-lg shadow-md text-sm" onclick="selectColor('green')">GREEN</button>
                                <button id="bet-black" class="bet-btn bg-[#111827] text-white font-bold py-2 rounded-lg shadow-md text-sm border border-gray-600" onclick="selectColor('black')">BLACK</button>
                            </div>
                        </div>
                        <button id="spin-roulette-btn" class="w-full mt-2 btn-neon py-3 rounded-xl font-heading text-xl font-black" onclick="spinRoulette()" disabled>PLACE BET</button>
                    </div>
                </div>
            </div>

            <!-- DIELBS TX Monitor overlay for bottom corner -->
            <div id="tx-monitor" class="fixed bottom-4 right-4 opacity-0 transition-opacity duration-300 pointer-events-none">
                <span class="text-xs font-mono text-green-400 bg-green-900/40 backdrop-blur-sm px-4 py-2 rounded-xl border border-green-500/50 inline-flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                    <i data-lucide="zap" class="w-4 h-4 animate-pulse"></i> 
                    DIELBS SPEED: <strong class="text-white text-sm" id="tx-time">0.00ms</strong>
                </span>
            </div>

        </div>
    </main>

    <!-- Interactive BG -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-10" style="background-image: linear-gradient(rgba(29, 78, 216, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(29, 78, 216, 0.2) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px); transform-origin: top center;"></div>

    <script>
        lucide.createIcons();

        // Global State
        let globalBalance = 10000;
        let globalBet = 100;
        
        function updateAllDisplays() {
            document.getElementById('global-balance').innerText = globalBalance.toLocaleString();
            document.getElementById('slots-bet').value = globalBet;
            document.getElementById('roulette-bet').value = globalBet;
        }

        function adjustBet(amount) {
            const newBet = globalBet + amount;
            if (newBet >= 50 && newBet <= globalBalance) {
                globalBet = newBet;
                updateAllDisplays();
            }
        }

        function switchTab(tabId) {
            // UI classes
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-900/40', 'border', 'border-blue-500', 'text-white');
                btn.classList.add('text-gray-400', 'hover:bg-white/5', 'hover:text-white', 'border-transparent');
            });
            const activeBtn = document.getElementById('nav-' + tabId);
            activeBtn.classList.remove('text-gray-400', 'hover:bg-white/5', 'border-transparent');
            activeBtn.classList.add('bg-blue-900/40', 'border', 'border-blue-500', 'text-white');

            // Tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        function showDielbsFlex() {
            const speedMs = (Math.random() * 1.5 + 0.5).toFixed(2);
            document.getElementById('tx-time').innerText = speedMs + "ms";
            document.getElementById('tx-monitor').style.opacity = '1';
            setTimeout(() => { document.getElementById('tx-monitor').style.opacity = '0'; }, 3000);
        }

        function validateWallet() {
            const wallet = document.getElementById('global-wallet').value.trim();
            if(!wallet) {
                alert("Please link your WebDollar 2 Payout Address first!");
                document.getElementById('global-wallet').focus();
                return false;
            }
            return true;
        }

        // --- BACKEND API INTEGRATION ---
        const API_BASE_URL = "https://webdollar2.onrender.com"; // UPDATE THIS TO YOUR RENDER URL

        async function reportWin(game, amountWon) {
            const wallet = document.getElementById('global-wallet').value.trim();
            if (!wallet) return;
            try {
                await fetch(`${API_BASE_URL}/api/casino/win`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet, game, amountWon })
                });
            } catch (e) {
                console.error("Win reporting failed. Is CORS enabled on backend?: ", e);
            }
        }

        // ================= FAUCET =================
        function claimFaucet() {
            if(!validateWallet()) return;
            const btn = document.getElementById('claim-btn');
            const status = document.getElementById('faucet-status');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-6 h-6 animate-spin"></i> PROCESSING VIA DIELBS...`;
            lucide.createIcons();
            
            setTimeout(() => {
                showDielbsFlex();
                globalBalance += 10000;
                updateAllDisplays();
                reportWin('Faucet', 10000);
                status.innerText = "✓ 10,000 WEBD simulated into your local ecosystem wallet!";
                btn.innerHTML = `CLAIM 10,000 WEBD <i data-lucide="zap" class="w-6 h-6"></i>`;
                lucide.createIcons();
                btn.disabled = false;
            }, 800);
        }

        // ================= SLOTS =================
        const SYMBOLS = ['💎', '💰', '🍒', '🍋', '🔔', '✨', '🪙'];
        function createReelStrip(reelId) {
            const strip = document.getElementById(reelId);
            strip.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const sym = document.createElement('div');
                sym.className = 'symbol text-5xl';
                const s = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                if (s === '🪙') {
                    sym.innerHTML = '<div class="w-20 h-20 bg-accent rounded-full border-4 border-white flex items-center justify-center shadow-[0_0_20px_#ffd700] p-0 m-0 leading-none"><span class="text-blue-900 font-heading font-black text-4xl block leading-none">W</span></div>';
                } else { sym.innerText = s; }
                strip.appendChild(sym);
            }
            strip.style.transform = `translateY(0px)`;
            strip.style.transition = 'none';
        }
        
        let slotsSpinning = false;
        async function spinSlots() {
            if(slotsSpinning || !validateWallet()) return;
            if(globalBalance < globalBet) return alert("Insufficient Balance!");
            
            slotsSpinning = true;
            globalBalance -= globalBet;
            updateAllDisplays();
            document.getElementById('slots-msg').style.opacity = '0';
            
            createReelStrip('reel-1'); createReelStrip('reel-2'); createReelStrip('reel-3');
            document.body.offsetHeight; // reflow
            
            const results = [];
            for(let i=0; i<3; i++) results.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
            
            const strips = [document.getElementById('reel-1'), document.getElementById('reel-2'), document.getElementById('reel-3')];
            strips.forEach((strip, index) => {
                const s = results[index];
                if (s === '🪙') {
                    strip.children[50].innerHTML = '<div class="w-20 h-20 bg-accent rounded-full border-4 border-white flex items-center justify-center shadow-[0_0_20px_#ffd700] p-0 m-0 leading-none"><span class="text-blue-900 font-heading font-black text-4xl block leading-none">W</span></div>';
                } else { strip.children[50].innerText = s; }
            });
            
            const ease = "cubic-bezier(0.1, 0.7, 0.1, 1)";
            const spinReel = (strip, delay, duration) => {
                return new Promise(resolve => {
                    setTimeout(() => {
                        strip.style.transition = `transform ${duration}s ${ease}`;
                        strip.style.transform = `translateY(-${50 * 100}px)`;
                        setTimeout(resolve, duration * 1000);
                    }, delay * 1000);
                });
            };
            
            await Promise.all([spinReel(strips[0], 0, 2), spinReel(strips[1], 0.2, 2.5), spinReel(strips[2], 0.4, 3)]);
            
            showDielbsFlex();
            const wildCount = results.filter(s => s === '🪙').length;
            let win = 0, msg = "";
            
            if (results[0] === results[1] && results[1] === results[2]) {
                if (results[0] === '🪙') { win = globalBet * 1000; msg = "MEGA JACKPOT!!"; }
                else if (results[0] === '💎') { win = globalBet * 50; msg = "DIAMOND WIN!"; }
                else { win = globalBet * 10; msg = "3 OF A KIND!"; }
            } else if ((results[0]===results[1] && results[2]==='🪙') || (results[1]===results[2] && results[0]==='🪙') || (results[0]===results[2] && results[1]==='🪙') || wildCount >= 2) {
                win = globalBet * 10; msg = "WILD MATCH!";
            } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2] || wildCount === 1) {
                win = globalBet * 2; msg = "NICE WIN!";
            }
            
            if(win > 0) {
                globalBalance += win; updateAllDisplays();
                reportWin('Slots', win);
                document.getElementById('slots-msg').innerText = msg;
                document.getElementById('slots-msg').style.opacity = '1';
            }
            slotsSpinning = false;
        }

        // ================= ROULETTE =================
        let rSelectedColor = null;
        let rSpinning = false;
        let rRot = 0;
        const R_NUMS = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        function getColor(n) { if (n===0) return 'green'; return [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(n) ? 'red':'black'; }
        
        function selectColor(c) {
            if(rSpinning) return;
            rSelectedColor = c;
            ['red','green','black'].forEach(c=>document.getElementById('bet-'+c).classList.remove('selected'));
            document.getElementById('bet-'+c).classList.add('selected');
            document.getElementById('spin-roulette-btn').disabled = false;
            document.getElementById('spin-roulette-btn').innerText = "SPIN WHEEL";
        }

        async function spinRoulette() {
            if(rSpinning || !rSelectedColor || !validateWallet()) return;
            if(globalBalance < globalBet) return alert("Insufficient Balance!");
            
            rSpinning = true;
            globalBalance -= globalBet; updateAllDisplays();
            document.getElementById('spin-roulette-btn').disabled = true;
            document.getElementById('spin-roulette-btn').innerHTML = "SPINNING...";
            document.getElementById('r-result').innerText = "--";

            const winningIndex = Math.floor(Math.random() * R_NUMS.length);
            const wNum = R_NUMS[winningIndex];
            const wColor = getColor(wNum);
            
            const targetAngle = -(winningIndex * (360/37));
            rRot = rRot + 1080 + targetAngle - (rRot % 360);
            document.getElementById('wheel').style.transform = `rotate(${rRot}deg)`;
            
            await new Promise(r => setTimeout(r, 3000));
            
            showDielbsFlex();
            document.getElementById('r-result').innerText = wNum;
            document.getElementById('r-result').className = `text-4xl font-black font-mono drop-shadow-md ` + 
                (wColor==='red'?'text-red-500':wColor==='green'?'text-green-500':'text-gray-400');
            
            if(wColor === rSelectedColor) {
                const w = (rSelectedColor === 'green') ? globalBet * 14 : globalBet * 2;
                globalBalance += w; updateAllDisplays();
                reportWin('Roulette', w);
                alert(`WINNER! Won ${w} WEBD!`);
            }
            
            rSpinning = false;
            rSelectedColor = null;
            ['red','green','black'].forEach(c=>document.getElementById('bet-'+c).classList.remove('selected'));
            document.getElementById('spin-roulette-btn').innerText = "PLACE BET";
        }
