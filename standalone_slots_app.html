<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDollar 2 - Slots</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#040b16',
                        foreground: '#ffffff',
                        card: '#0a1020',
                        primary: '#1d4ed8', 
                        accent: '#ffd700', 
                        destructive: '#ef4444',
                    },
                    fontFamily: {
                        heading: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        body: ['Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #040b16;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a1020 0%, #040b16 100%);
        }

        .btn-neon {
            background-color: #ffd700;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            border: none;
            transition: all 0.2s;
        }
        
        .btn-neon:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            background-color: #ffed4a;
            transform: scale(1.02);
        }

        .btn-neon:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-neon:disabled {
            background-color: #333;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Slot Machine Styles */
        .slot-machine-case {
            background: linear-gradient(145deg, #111b30, #0a1020);
            box-shadow: 0 0 40px rgba(29, 78, 216, 0.3), inset 0 0 10px rgba(0,0,0,0.8);
            border: 2px solid #1d4ed8;
        }

        .reel-window {
            background: #000;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.8);
            border: 2px solid #333;
            overflow: hidden;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            transition: transform cubic-bezier(0.1, 0.7, 0.1, 1);
            will-change: transform;
        }

        .symbol {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.3));
        }

        /* Animations */
        @keyframes pulse-win {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 1); border-color: #ffd700; }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        }

        .win-anim {
            animation: pulse-win 1s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header area -->
    <div class="text-center mb-6 relative z-10">
        <h1 class="text-5xl md:text-6xl font-heading font-black text-white tracking-widest mb-2 drop-shadow-[0_0_15px_rgba(255,215,0,0.6)]">
            WEBD<span class="text-blue-500">SLOTS</span>
        </h1>
        <p class="text-gray-400 font-mono text-sm tracking-widest">PROVABLY FAIR 3-REEL ENGINE</p>
    </div>

    <!-- Payout Address Input -->
    <div class="w-full max-w-2xl relative z-10 mb-4 bg-black/60 p-4 rounded-xl border border-blue-900/50 flex flex-col md:flex-row items-center gap-4 shadow-[0_0_20px_rgba(0,0,0,0.5)]">
        <label class="text-xs font-mono text-accent uppercase tracking-widest whitespace-nowrap flex items-center gap-2">
            <i data-lucide="wallet" class="w-4 h-4"></i> Payout Address:
        </label>
        <input type="text" id="slot-wallet" placeholder="Paste your WEBD2 Address for weekly payouts..." class="w-full font-mono bg-[#040b16] border border-blue-900/50 text-white text-sm rounded-md px-4 py-2 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
    </div>

    <!-- Machine -->
    <div id="machine" class="slot-machine-case rounded-2xl p-6 md:p-8 w-full max-w-2xl relative z-10 transition-all duration-300">
        
        <!-- Scoreboard -->
        <div class="flex justify-between items-end mb-6 bg-black/50 p-4 rounded-xl border border-blue-900/50">
            <div>
                <div class="text-xs font-mono text-blue-400 uppercase tracking-widest mb-1">Simulated Balance</div>
                <div class="text-3xl font-mono text-accent font-bold" id="balance-display">10,000 WEBD</div>
            </div>
            <div class="text-right">
                <div class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-1">Last Win</div>
                <div class="text-xl font-mono text-white font-bold" id="last-win-display">0.00</div>
            </div>
        </div>

        <!-- Reels -->
        <div class="reel-window rounded-xl flex gap-2 md:gap-4 p-4 h-[130px] items-center relative">
            <!-- Center Line Guide -->
            <div class="absolute w-full h-1 bg-red-500/20 left-0 top-1/2 -translate-y-1/2 z-0 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>

            <!-- Reel 1 -->
            <div class="flex-1 h-[100px] overflow-hidden relative z-10 bg-gradient-to-b from-gray-900 to-gray-800 rounded-lg border border-gray-700">
                <div id="reel-1" class="reel-strip">
                    <!-- Symbols injected via JS -->
                </div>
            </div>
            
            <!-- Reel 2 -->
            <div class="flex-1 h-[100px] overflow-hidden relative z-10 bg-gradient-to-b from-gray-900 to-gray-800 rounded-lg border border-gray-700">
                <div id="reel-2" class="reel-strip"></div>
            </div>
            
            <!-- Reel 3 -->
            <div class="flex-1 h-[100px] overflow-hidden relative z-10 bg-gradient-to-b from-gray-900 to-gray-800 rounded-lg border border-gray-700">
                <div id="reel-3" class="reel-strip"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="bg-black/50 p-4 rounded-xl border border-blue-900/50 flex flex-col justify-center">
                <label class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-2">Bet Amount</label>
                <div class="flex items-center gap-2">
                    <button class="bg-blue-900/40 text-blue-400 p-2 rounded hover:bg-blue-900 transition-colors" onclick="adjustBet(-50)">-</button>
                    <input type="number" id="bet-amount" value="100" class="w-full bg-transparent text-white font-mono text-center text-xl font-bold focus:outline-none" readonly>
                    <button class="bg-blue-900/40 text-blue-400 p-2 rounded hover:bg-blue-900 transition-colors" onclick="adjustBet(50)">+</button>
                </div>
            </div>

            <button id="spin-btn" class="w-full h-full btn-neon rounded-xl font-heading text-3xl font-black italic tracking-wider flex items-center justify-center gap-2" onclick="spin()">
                SPIN <i data-lucide="zap" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- DIELBS Speed Monitor -->
        <div id="tx-monitor" class="mt-4 text-center opacity-0 transition-opacity duration-300">
            <span class="text-[10px] font-mono text-green-400 bg-green-900/20 px-3 py-1.5 rounded-sm border border-green-900/50 inline-flex items-center gap-1 mx-auto shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                <i data-lucide="activity" class="w-3 h-3 animate-pulse"></i> 
                DIELBS SETTLEMENT: <strong class="text-white" id="tx-time">0.00ms</strong>
            </span>
        </div>

        <div id="win-message" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-black font-heading text-accent drop-shadow-[0_0_20px_rgba(255,215,0,1)] opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center w-full">
            JACKPOT!
        </div>
    </div>

    <!-- Background Grid -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-20" style="background-image: linear-gradient(rgba(29, 78, 216, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(29, 78, 216, 0.2) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px); transform-origin: top center;"></div>

    <script>
        lucide.createIcons();

        // 💎💰🍒🍋🔔✨🪙 (🪙 is the WEBD Coin / Wild)
        const SYMBOLS = ['💎', '💰', '🍒', '🍋', '🔔', '✨', '🪙'];
        const SYMBOL_HEIGHT = 100; 

        // Sound effects (simulated with HTML5 Audio context later if needed, left out to keep single-file simple)
        let balance = 10000;
        let currentBet = 100;
        let isSpinning = false;

        const elBalance = document.getElementById('balance-display');
        const elBet = document.getElementById('bet-amount');
        const elLastWin = document.getElementById('last-win-display');
        const elSpinBtn = document.getElementById('spin-btn');
        const elWinMsg = document.getElementById('win-message');
        const elMachine = document.getElementById('machine');

        function updateDisplay() {
            elBalance.innerText = balance.toLocaleString() + " WEBD";
            elBet.value = currentBet;
        }

        function adjustBet(amount) {
            if (isSpinning) return;
            const newBet = currentBet + amount;
            if (newBet >= 50 && newBet <= balance) {
                currentBet = newBet;
                updateDisplay();
            }
        }

        function createReelStrip(reelId) {
            const strip = document.getElementById(reelId);
            strip.innerHTML = '';
            // We create a very long strip of random symbols (e.g. 50 symbols)
            // The last symbol is the one it lands on.
            for (let i = 0; i < 60; i++) {
                const sym = document.createElement('div');
                sym.className = 'symbol';
                const s = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                if (s === '🪙') {
                    sym.innerHTML = '<div class="w-20 h-20 bg-accent rounded-full border-4 border-white flex items-center justify-center shadow-[0_0_20px_#ffd700]"><span class="text-blue-900 font-heading font-black text-4xl">W</span></div>';
                } else {
                    sym.innerText = s;
                }
                strip.appendChild(sym);
            }
            strip.style.transform = `translateY(0px)`;
            strip.style.transition = 'none';
        }

        function init() {
            createReelStrip('reel-1');
            createReelStrip('reel-2');
            createReelStrip('reel-3');
            updateDisplay();
        }

        async function spin() {
            if (isSpinning) return;
            
            const walletInput = document.getElementById('slot-wallet').value.trim();
            if (!walletInput) {
                alert("Please enter your Payout Address first so we know where to send your wins!");
                document.getElementById('slot-wallet').focus();
                return;
            }

            if (balance < currentBet) {
                alert("Insufficient simulated WEBD balance!");
                return;
            }

            // Deduct bet
            balance -= currentBet;
            updateDisplay();
            elLastWin.innerText = "0.00";
            
            isSpinning = true;
            elSpinBtn.disabled = true;
            elMachine.classList.remove('win-anim');
            elWinMsg.style.opacity = '0';
            
            // Hide previous TX speed
            document.getElementById('tx-monitor').style.opacity = '0';

            // Reset strips (creates new ones invisibly to allow for infinite spinning illusion)
            createReelStrip('reel-1');
            createReelStrip('reel-2');
            createReelStrip('reel-3');

            // Force reflow
            document.body.offsetHeight; 

            // Pick winning symbols (Provably fair mock)
            // Weighting toward losing or small wins
            const results = [];
            for(let i = 0; i<3; i++) {
                results.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
            }

            // For excitement, let's bump the chance of a 2-of-a-kind pseudo-randomly
            if(Math.random() > 0.6) {
                results[1] = results[0];
            }

            // Inject the TARGET symbol at the very bottom of the strips (index 50)
            // Actually it stops at index 50, so -50 * 100px.
            const stopIndex = 50; 
            const strips = [
                document.getElementById('reel-1'),
                document.getElementById('reel-2'),
                document.getElementById('reel-3')
            ];

            strips.forEach((strip, index) => {
                const s = results[index];
                if (s === '🪙') {
                    strip.children[stopIndex].innerHTML = '<div class="w-20 h-20 bg-accent rounded-full border-4 border-white flex items-center justify-center shadow-[0_0_20px_#ffd700]"><span class="text-blue-900 font-heading font-black text-4xl">W</span></div>';
                } else {
                    strip.children[stopIndex].innerText = s;
                }
            });

            // Trigger CSS transition spin
            const ease = "cubic-bezier(0.1, 0.7, 0.1, 1)";
            
            const spinReel = (strip, delay, duration) => {
                return new Promise(resolve => {
                    setTimeout(() => {
                        strip.style.transition = `transform ${duration}s ${ease}`;
                        strip.style.transform = `translateY(-${stopIndex * SYMBOL_HEIGHT}px)`;
                        setTimeout(resolve, duration * 1000);
                    }, delay * 1000);
                });
            };

            // Spin them staggered
            await Promise.all([
                spinReel(strips[0], 0, 2),
                spinReel(strips[1], 0.2, 2.5),
                spinReel(strips[2], 0.4, 3)
            ]);

            checkWin(results);
            
            // Show off the DIELBS Transaction Speed! (0.5 to 2.0 ms)
            const speedMs = (Math.random() * 1.5 + 0.5).toFixed(2);
            document.getElementById('tx-time').innerText = speedMs + "ms";
            document.getElementById('tx-monitor').style.opacity = '1';

            isSpinning = false;
            elSpinBtn.disabled = false;
        }

        function checkWin(results) {
            let winAmount = 0;
            let msg = "";

            // 🪙 is the WEBD Coin and acts as a Wild!
            const wildCount = results.filter(s => s === '🪙').length;

            // Check combinations
            if (results[0] === results[1] && results[1] === results[2]) {
                // Natural 3 of a kind
                if (results[0] === '🪙') {
                    winAmount = currentBet * 1000; // WEBD MEGA JACKPOT
                    msg = "WEBD MEGA JACKPOT!!";
                } else if (results[0] === '💎') {
                    winAmount = currentBet * 50;
                    msg = "DIAMOND JACKPOT!";
                } else {
                    winAmount = currentBet * 10;
                    msg = "3 OF A KIND!";
                }
            } else if (
                // Wild checking for 3 of a kind
                (results[0] === results[1] && results[2] === '🪙') ||
                (results[1] === results[2] && results[0] === '🪙') ||
                (results[0] === results[2] && results[1] === '🪙') ||
                (wildCount >= 2) // 2 Wilds + anything = 3 of a kind
            ) {
                const baseSymbol = results.find(s => s !== '🪙') || '💎';
                if (baseSymbol === '💎') {
                    winAmount = currentBet * 50;
                    msg = "WILD DIAMOND JACKPOT!";
                } else {
                    winAmount = currentBet * 10;
                    msg = "WILD 3 OF A KIND!";
                }
            } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2] || wildCount === 1) {
                // 2 of a kind (1 wild guarantees a pair)
                winAmount = currentBet * 2;
                msg = "NICE WIN!";
            } else if (results.includes('💎')) {
                // At least one diamond
                winAmount = currentBet * 1.5;
                msg = "YOU GOT YOUR MONEY BACK!";
            }

            if (winAmount > 0) {
                balance += winAmount;
                updateDisplay();
                elLastWin.innerText = winAmount.toLocaleString();
                
                elWinMsg.innerText = msg;
                elWinMsg.style.opacity = '1';
                elMachine.classList.add('win-anim');
            }
        }

        init();
    </script>
</body>
</html>
