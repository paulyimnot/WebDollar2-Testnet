<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDollar 2 - DIELBS Roulette</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#040b16',
                        foreground: '#ffffff',
                        card: '#0a1020',
                        primary: '#1d4ed8', 
                        accent: '#ffd700', 
                        destructive: '#ef4444',
                        roulettered: '#e63946',
                        rouletteblack: '#111827',
                        roulettegreen: '#22c55e',
                    },
                    fontFamily: {
                        heading: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        body: ['Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #040b16;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a1020 0%, #040b16 100%);
        }

        .btn-neon {
            background-color: #ffd700;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            border: none;
            transition: all 0.2s;
        }
        
        .btn-neon:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            background-color: #ffed4a;
            transform: scale(1.02);
        }

        .btn-neon:disabled {
            background-color: #333;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }

        .wheel-container {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(
                #22c55e 0 9.7deg, 
                #e63946 9.7deg 19.4deg, #111827 19.4deg 29.1deg, 
                #e63946 29.1deg 38.8deg, #111827 38.8deg 48.5deg,
                #e63946 48.5deg 58.2deg, #111827 58.2deg 67.9deg,
                #e63946 67.9deg 77.6deg, #111827 77.6deg 87.3deg,
                #e63946 87.3deg 97deg, #111827 97deg 106.7deg,
                #e63946 106.7deg 116.4deg, #111827 116.4deg 126.1deg,
                #e63946 126.1deg 135.8deg, #111827 135.8deg 145.5deg,
                #e63946 145.5deg 155.2deg, #111827 155.2deg 164.9deg,
                #e63946 164.9deg 174.6deg, #111827 174.6deg 184.3deg,
                #e63946 184.3deg 194deg, #111827 194deg 203.7deg,
                #e63946 203.7deg 213.4deg, #111827 213.4deg 223.1deg,
                #e63946 223.1deg 232.8deg, #111827 232.8deg 242.5deg,
                #e63946 242.5deg 252.2deg, #111827 252.2deg 261.9deg,
                #e63946 261.9deg 271.6deg, #111827 271.6deg 281.3deg,
                #e63946 281.3deg 291deg, #111827 291deg 300.7deg,
                #e63946 300.7deg 310.4deg, #111827 310.4deg 320.1deg,
                #e63946 320.1deg 329.8deg, #111827 329.8deg 339.5deg,
                #e63946 339.5deg 349.2deg, #111827 349.2deg 360deg
            );
            border: 8px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3), inset 0 0 20px rgba(0,0,0,0.8);
            transition: transform 3s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            background-color: #040b16;
            border-radius: 50%;
            border: 4px solid #1d4ed8;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ffffff;
            z-index: 20;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .bet-btn {
            transition: all 0.2s;
        }
        .bet-btn:hover {
            transform: translateY(-2px);
        }
        .bet-btn.selected {
            ring: 2px;
            ring-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transform: scale(1.05);
            border: 2px solid #ffd700;
        }

        /* Animations */
        @keyframes pulse-win {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 1); border-color: #ffd700; }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        }

        .win-anim {
            animation: pulse-win 1s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header area -->
    <div class="text-center mb-6 relative z-10 w-full">
        <h1 class="text-4xl md:text-5xl font-heading font-black text-white tracking-widest mb-1 drop-shadow-[0_0_15px_rgba(255,215,0,0.6)]">
            ROULETTE <span class="text-blue-500">WEBD</span>
        </h1>
        <p class="text-gray-400 font-mono text-xs tracking-widest">DIELBS CASINO ECOSYSTEM</p>
    </div>

    <!-- Payout Address Input -->
    <div class="w-full max-w-2xl relative z-10 mb-4 bg-black/60 p-3 rounded-xl border border-blue-900/50 flex flex-col md:flex-row items-center gap-4 shadow-[0_0_20px_rgba(0,0,0,0.5)]">
        <label class="text-xs font-mono text-accent uppercase tracking-widest whitespace-nowrap flex items-center gap-2">
            <i data-lucide="wallet" class="w-4 h-4"></i> Payout Address:
        </label>
        <input type="text" id="slot-wallet" placeholder="Paste your WEBD2 Address for weekly payouts..." class="w-full font-mono bg-[#040b16] border border-blue-900/50 text-white text-sm rounded-md px-4 py-2 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
    </div>

    <!-- Main Game UI -->
    <div class="bg-black/40 border border-blue-900/50 rounded-2xl p-6 md:p-8 w-full max-w-2xl relative z-10 shadow-[0_0_30px_rgba(29,78,216,0.3)]">
        
        <div class="flex flex-col md:flex-row gap-8 items-center justify-between">
            
            <!-- Wheel Side -->
            <div class="flex-shrink-0 relative">
                <div class="pointer"></div>
                <!-- The spinning wheel outer rim -->
                <div class="wheel-container" id="wheel"></div>
                
                <!-- The static center -->
                <div class="wheel-center text-center">
                    <span class="text-xs text-gray-500 font-mono uppercase tracking-widest mb-1">Last Spin</span>
                    <span class="text-5xl font-black font-mono text-white drop-shadow-md" id="result-display">--</span>
                    <span class="text-xs font-mono px-2 py-0.5 mt-2 rounded-full" id="result-color">WAITING</span>
                </div>
            </div>

            <!-- Betting Side -->
            <div class="flex-grow w-full flex flex-col gap-4">
                
                <!-- Scoreboard -->
                <div class="flex justify-between items-center bg-black/60 p-3 rounded-xl border border-blue-900/40">
                    <div>
                        <div class="text-[10px] font-mono text-blue-400 uppercase tracking-widest mb-1">Simulated WEBD</div>
                        <div class="text-xl font-mono text-accent font-bold" id="balance-display">10,000</div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mb-2 block">1. Select Bet Amount</label>
                    <div class="flex items-center gap-2 bg-black/50 p-2 rounded-lg border border-blue-900/30">
                        <button class="bg-blue-900/40 text-blue-400 p-2 border border-blue-800/50 rounded hover:bg-blue-900 transition-colors" onclick="adjustBet(-50)">-</button>
                        <input type="number" id="bet-amount" value="100" class="w-full bg-transparent text-white font-mono text-center text-lg font-bold focus:outline-none" readonly>
                        <button class="bg-blue-900/40 text-blue-400 p-2 border border-blue-800/50 rounded hover:bg-blue-900 transition-colors" onclick="adjustBet(50)">+</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mb-2 block">2. Select Color (Payouts)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="bet-red" class="bet-btn bg-roulettered text-white font-bold py-3 rounded-lg border border-red-900 shadow-md flex flex-col items-center" onclick="selectColor('red')">
                            RED <span class="text-xs opacity-70 font-mono font-normal block">2x</span>
                        </button>
                        <button id="bet-green" class="bet-btn bg-roulettegreen text-white font-bold py-3 rounded-lg border border-green-900 shadow-md flex flex-col items-center" onclick="selectColor('green')">
                            GREEN <span class="text-xs opacity-70 font-mono font-normal block">14x</span>
                        </button>
                        <button id="bet-black" class="bet-btn bg-rouletteblack text-white font-bold py-3 rounded-lg border border-gray-700 shadow-md flex flex-col items-center" onclick="selectColor('black')">
                            BLACK <span class="text-xs opacity-70 font-mono font-normal block">2x</span>
                        </button>
                    </div>
                </div>

                <button id="spin-btn" class="w-full h-14 mt-2 btn-neon rounded-xl font-heading text-2xl font-black tracking-wider flex items-center justify-center gap-2" onclick="spinWheel()" disabled>
                    PLACE BET <i data-lucide="play" class="w-5 h-5"></i>
                </button>

            </div>

        </div>

        <!-- DIELBS Speed Monitor -->
        <div id="tx-monitor" class="mt-6 text-center opacity-0 transition-opacity duration-300">
            <span class="text-[10px] font-mono text-green-400 bg-green-900/20 px-3 py-1.5 rounded-sm border border-green-900/50 inline-flex items-center gap-1 mx-auto shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                <i data-lucide="activity" class="w-3 h-3 animate-pulse"></i> 
                DIELBS SETTLEMENT: <strong class="text-white" id="tx-time">0.00ms</strong>
            </span>
        </div>

    </div>

    <!-- Background Grid -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-10" style="background-image: linear-gradient(rgba(29, 78, 216, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(29, 78, 216, 0.2) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px); transform-origin: top center;"></div>

    <script>
        lucide.createIcons();

        let balance = 10000;
        let currentBet = 100;
        let selectedColor = null;
        let isSpinning = false;
        let currentRotation = 0; // Tracks absolute rotation degrees over multiple spins

        // Standard American/European hybrid numbers for demo
        const ROULETTE_NUMBERS = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];

        function getNumberColor(num) {
            if (num === 0) return 'green';
            // Even indexes in the staggered array generally alternate 
            // Simplified standard mapping for prototype:
            const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            return reds.includes(num) ? 'red' : 'black';
        }

        function updateDisplay() {
            document.getElementById('balance-display').innerText = balance.toLocaleString();
            document.getElementById('bet-amount').value = currentBet;
        }

        function adjustBet(amount) {
            if (isSpinning) return;
            const newBet = currentBet + amount;
            if (newBet >= 50 && newBet <= balance) {
                currentBet = newBet;
                updateDisplay();
            }
        }

        function selectColor(color) {
            if (isSpinning) return;
            selectedColor = color;
            
            // UI Update
            document.getElementById('bet-red').classList.remove('selected');
            document.getElementById('bet-black').classList.remove('selected');
            document.getElementById('bet-green').classList.remove('selected');
            
            document.getElementById(`bet-${color}`).classList.add('selected');
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('spin-btn').innerText = "SPIN WHEEL";
        }

        async function spinWheel() {
            if (isSpinning || !selectedColor) return;
            
            const walletInput = document.getElementById('slot-wallet').value.trim();
            if (!walletInput) {
                alert("Please enter your Payout Address first so we know where to send your wins in the weekly sweep!");
                document.getElementById('slot-wallet').focus();
                return;
            }

            if (balance < currentBet) {
                alert("Insufficient simulated WEBD balance!");
                return;
            }

            // Deduct
            balance -= currentBet;
            updateDisplay();
            
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('spin-btn').innerHTML = `SPINNING... <i data-lucide="loader" class="w-5 h-5 animate-spin"></i>`;
            lucide.createIcons();
            document.getElementById('tx-monitor').style.opacity = '0';
            
            // Reset Center UI
            const resDisplay = document.getElementById('result-display');
            const resColorDisplay = document.getElementById('result-color');
            resDisplay.innerText = "--";
            resColorDisplay.innerText = "WAITING";
            resColorDisplay.className = "text-xs font-mono px-2 py-0.5 mt-2 rounded-full";

            /* 
               Compute winning number and rotation.
               Wheel has 37 slices. Each is 360/37 = 9.729 degrees.
               We just pick a random index from ROULETTE_NUMBERS.
            */
            const winningIndex = Math.floor(Math.random() * ROULETTE_NUMBERS.length);
            const winningNumber = ROULETTE_NUMBERS[winningIndex];
            const winningColor = getNumberColor(winningNumber);

            // Calculate degrees to land on that slice.
            // 0 is top. Spinning clockwise decreases top value relative to pointer.
            // We'll spin it at least 3 full rotations (3 * 360 = 1080)
            const baseRotations = 1080;
            const sliceAngle = 360 / 37;
            
            // Target angle (where top aligns with the desired slice)
            // Index 0 represents green at top. 
            // We want index `winningIndex` to be at top. So we subtract its angle.
            const targetAngle = -(winningIndex * sliceAngle); 

            // Update current global rotation so it doesn't snap back when re-spinning
            currentRotation = currentRotation + baseRotations + targetAngle - (currentRotation % 360);

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Wait for 3s CSS transition to finish 
            await new Promise(r => setTimeout(r, 3000));

            // Execute DIELBS Mock Transaction Speed
            const speedMs = (Math.random() * 1.5 + 0.5).toFixed(2);
            document.getElementById('tx-time').innerText = speedMs + "ms";
            document.getElementById('tx-monitor').style.opacity = '1';

            // Show Result
            resDisplay.innerText = winningNumber;
            resColorDisplay.innerText = winningColor.toUpperCase();
            
            if(winningColor === 'red') resColorDisplay.classList.add('bg-roulettered', 'text-white');
            else if(winningColor === 'black') resColorDisplay.classList.add('bg-white', 'text-black');
            else if(winningColor === 'green') resColorDisplay.classList.add('bg-roulettegreen', 'text-white');

            // Evaluate Win
            let winAmount = 0;
            if (winningColor === selectedColor) {
                if (selectedColor === 'green') winAmount = currentBet * 14;
                else winAmount = currentBet * 2;
                
                balance += winAmount;
                updateDisplay();
                alert(`WINNER! You won ${winAmount.toLocaleString()} WEBD! Transaction confirmed in ${speedMs}ms directly onto the DIELBS engine.`);
            }

            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('spin-btn').innerText = "PLACE BET";
            lucide.createIcons();
            
            // Deselect color
            selectedColor = null;
            document.getElementById('bet-red').classList.remove('selected');
            document.getElementById('bet-black').classList.remove('selected');
            document.getElementById('bet-green').classList.remove('selected');
            document.getElementById('spin-btn').disabled = true; // wait for re-select
        }

    </script>
</body>
</html>
